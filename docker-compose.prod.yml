# 生產環境 Docker Compose 配置 (簡化版)
# 使用本地 Ollama 服務，僅部署必要的 API 和 Redis

services:
  # FastAPI 應用
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soapvoice-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal:11434}
    volumes:
      - ./:/app
      - model-cache:/models
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - soapvoice-net

  # Redis 快取層
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: soapvoice-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - soapvoice-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx 反向代理 (可選)
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: soapvoice-nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - soapvoice-net
    profiles:
      - with-nginx

volumes:
  model-cache:
    driver: local
  redis-data:
    driver: local

networks:
  soapvoice-net:
    driver: bridge
