# Nginx 生產環境配置

events {
    worker_connections 1024;
}

http {
    # 上游服務配置
    upstream soapvoice_api {
        least_conn;
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # 日誌格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/soapvoice_access.log main;
    error_log /var/log/nginx/soapvoice_error.log warn;

    # 效能優化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 壓縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        server_name soapvoice.local;

        # 安全標頭
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 健康檢查端點 (不限制速率)
        location = /health {
            proxy_pass http://soapvoice_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # WebSocket 支援
        location /ws/ {
            proxy_pass http://soapvoice_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # API 端點
        location /api/ {
            # 速率限制
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://soapvoice_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超時設定
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 靜態文件 (Swagger UI, ReDoc)
        location /docs {
            proxy_pass http://soapvoice_api;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://soapvoice_api;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://soapvoice_api;
            proxy_set_header Host $host;
        }

        # 預設
        location / {
            proxy_pass http://soapvoice_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS 配置 (生產環境)
    # server {
    #     listen 443 ssl http2;
    #     server_name soapvoice.your-domain.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/soapvoice.your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/soapvoice.your-domain.com/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # 同上配置...
    # }
}
