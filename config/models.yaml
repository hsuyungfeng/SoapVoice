# Model Configuration
# AI 模型配置文件

whisper:
  # Faster-Whisper 模型配置
  model_id: "large-v3"
  device: "cuda"
  compute_type: "float16"
  language: "auto"  # 自動偵測語言
  task: "transcribe"
  beam_size: 5
  vad_filter: true
  
  # 下載配置
  download_root: null  # 使用預設路徑 ~/.cache/huggingface/hub
  
  # 支援的語言
  supported_languages:
    - "en"  # English
    - "zh"  # Chinese
    - "ja"  # Japanese
    - "ko"  # Korean
    - "es"  # Spanish
    - "fr"  # French
    - "de"  # German

llm:
  # LLM 模型配置 (Ollama 本地部署)
  provider: "ollama"
  model: "qwen3.5:35b"  # 主模型：Qwen3.5 35B
  api_base: "http://localhost:11434"  # Ollama 服務
  temperature: 0.3
  max_tokens: 1024

  # 備用模型配置
  fallback_models:
    - "qwen3.5:27b"  # 較小的 Qwen3.5 版本
    - "glm-4.7-flash:latest"  # 快速推理模型

  # Ollama 配置
  ollama:
    num_ctx: 4096
    num_gpu: 1
    num_thread: 16

# GPU 配置
gpu:
  asr_device: "cuda:1"  # Whisper 使用 GPU1
  llm_device: "cuda:0"  # LLM 使用 GPU0

# 效能目標
performance:
  asr_max_latency_ms: 500  # ASR 延遲目標 < 500ms
  llm_max_latency_ms: 1000  # LLM 延遲目標 < 1s
