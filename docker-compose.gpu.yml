# SoapVoice Docker Compose - GPU Version (Windows/Linux with NVIDIA GPU)
# 需要 NVIDIA GPU 和 CUDA

version: "3.8"

services:
  # FastAPI 應用（GPU 模式）
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: soapvoice-api-gpu
    ports:
      - "8000:8000"
    environment:
      # GPU 模式：使用較大的模型
      - LLM_MODEL=qwen2.5:7b
      - LLM_PRIORITY=local_first
      - OLLAMA_HOST=ollama:11434
      - PYTHONUNBUFFERED=1
      # GPU 配置
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./:/app
      - model-cache:/models
      - ./data:/app/data
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - soapvoice-net

  # Ollama LLM Service (GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: soapvoice-ollama-gpu
    ports:
      - "11434:11434"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - OLLAMA_MODELS=/models/ollama
    volumes:
      - model-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - soapvoice-net
    command: serve

volumes:
  model-cache:
    driver: local

networks:
  soapvoice-net:
    driver: bridge